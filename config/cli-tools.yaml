# CLIs externas que BattOS intenta detectar al arrancar.
#
# Detección: presencia + path + versión. Instalación: install_command se ejecuta
# en el host SOLO tras un approval explícito (POST /cli-tools/{id}/install +
# approve — Etapa 2). install_url es la doc oficial para instalación manual.
#
# NOTA: la fuente operativa de detección/instalación es `approvedRuntimeTools`
# en apps/api/internal/handlers/runtimes.go — mantener ambos en sync.

cli_tools:
  - id: claude-code
    name: Claude Code
    command: claude
    kind: coding_agent
    risk_level: high
    requires_auth: true
    capabilities: [code_editing, file_reading, terminal_commands, mcp]
    install_command: npm install -g @anthropic-ai/claude-code
    install_url: https://docs.claude.com/en/docs/claude-code/setup

  - id: codex
    name: Codex CLI
    command: codex
    kind: coding_agent
    risk_level: high
    requires_auth: true
    capabilities: [code_generation, repo_editing, tests]
    install_command: npm install -g @openai/codex
    install_url: https://github.com/openai/codex

  - id: opencode
    name: OpenCode
    command: opencode
    kind: coding_agent
    risk_level: medium
    requires_auth: true
    capabilities: [code_editing, local_agent, terminal_workflows]
    install_command: npm install -g opencode-ai
    install_url: https://opencode.ai

  - id: gemini
    name: Gemini CLI
    command: gemini
    kind: coding_agent
    risk_level: medium
    requires_auth: true
    capabilities: [long_context, multimodal, code_generation]
    install_command: npm install -g @google/gemini-cli
    install_url: https://github.com/google-gemini/gemini-cli

  - id: pi
    name: Pi
    command: pi
    kind: coding_agent
    risk_level: medium
    requires_auth: true
    capabilities: [code_editing, terminal, skills]
    install_command: npm install -g @earendil-works/pi-coding-agent
    install_url: https://www.npmjs.com/package/@earendil-works/pi-coding-agent

  - id: gh
    name: GitHub CLI
    command: gh
    kind: dev_tool
    risk_level: medium
    requires_auth: true

  - id: docker
    name: Docker
    command: docker
    kind: infra
    risk_level: high
    requires_auth: false

  - id: node
    name: Node.js
    command: node
    kind: runtime
    risk_level: low
    requires_auth: false

  - id: python
    name: Python
    command: python
    kind: runtime
    risk_level: low
    requires_auth: false
