# Configuración principal de BattOS — runtime
#
# Cargado por viper. Las variables sensibles (API keys, passwords) NO van acá,
# van en infra/.env y se leen desde env vars.

api:
  # Dev sin token: escuchar solo local. En VPS usar 0.0.0.0 junto a auth token.
  host: "127.0.0.1"
  port: 8000
  # CORS — orígenes que pueden hablar con el API
  cors_origins:
    - "http://localhost:3000"

# Seguridad API en desarrollo local. En VPS usar `mode: "token"` y definir
# BATTOS_API_TOKEN por variable de entorno.
auth:
  mode: "disabled"  # disabled | token

memory:
  # Path relativo al cwd del API
  db_path: "data/memory/battos.db"
  # Usar FTS5 (true) o LIKE (false) para search
  use_fts5: true

knowledge:
  # Raiz del filesystem gestionado para artifacts del Knowledge Center.
  artifacts_dir: "data/artifacts"

logs:
  level: "info"   # debug | info | warn | error
  format: "json"  # json | text
  dir: "data/logs"

sysmetrics:
  # Frecuencia de muestreo del top bar (segundos)
  sample_interval_s: 1
  # Cuántas muestras mantener en memoria para sparklines
  history_size: 60

registries:
  # Paths donde el API lee los archivos MD al boot
  agents_dir: "agents"
  skills_dir: "skills"

execution:
  # Fase 4B: el worker real queda apagado por defecto hasta conectar sandbox
  # con contenedor efimero. dry_run registra el plan sin ejecutar comandos.
  # Cambia sandbox_mode a "docker" para probar contenedor efimero controlado.
  worker_enabled: false
  sandbox_mode: "dry_run"
  default_timeout_s: 1800
  poll_interval_s: 2
  docker_image: "alpine:3.20"
  workspaces_dir: "data/runs/workspaces"
  repositories_dir: "data/repositories"

# Asistente conversacional de BattOS
novacore:
  enabled: true
  provider: "anthropic"           # anthropic | openai
  model: "claude-3-haiku-20240307"
