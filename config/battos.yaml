# Configuración principal de BattOS — runtime
#
# Cargado por viper. Las variables sensibles (API keys, passwords) NO van acá,
# van en infra/.env y se leen desde env vars.

api:
  # Dev sin token: escuchar solo local. En VPS usar 0.0.0.0 junto a auth token.
  host: "127.0.0.1"
  port: 8000
  # CORS — orígenes que pueden hablar con el API
  cors_origins:
    - "http://localhost:3000"

# Seguridad API en desarrollo local. En VPS usar `mode: "token"` y definir
# BATTOS_API_TOKEN por variable de entorno.
auth:
  mode: "disabled"  # disabled | token

database:
  # SQLite unificado: work/runs/usage/repos/novacore/audit + Memory Core.
  path: "data/battos.db"

memory:
  # Legacy alias; el API usa database.path para la DB unificada.
  db_path: "data/battos.db"
  # Usar FTS5 (true) o LIKE (false) para search
  use_fts5: true

knowledge:
  # Raiz del filesystem gestionado para artifacts del Knowledge Center.
  artifacts_dir: "data/artifacts"

logs:
  level: "info"   # debug | info | warn | error
  format: "json"  # json | text
  dir: "data/logs"

sysmetrics:
  # Frecuencia de muestreo del top bar (segundos)
  sample_interval_s: 1
  # Cuántas muestras mantener en memoria para sparklines
  history_size: 60

registries:
  # Paths donde el API lee los archivos MD al boot
  agents_dir: "agents"
  skills_dir: "skills"

execution:
  # Fase 4B: el worker real queda apagado por defecto hasta conectar sandbox
  # con contenedor efimero. dry_run registra el plan sin ejecutar comandos.
  # Cambia sandbox_mode a "docker" para probar contenedor efimero controlado.
  worker_enabled: false
  sandbox_mode: "dry_run"
  default_timeout_s: 1800
  poll_interval_s: 2
  # Runs procesados en paralelo por el worker (RunPool, Etapa 3).
  # Para team-runs (lead + delegados simultaneos) se necesita >= 3.
  worker_concurrency: 3
  docker_image: "alpine:3.20"
  workspaces_dir: "data/runs/workspaces"
  repositories_dir: "data/repositories"
  # host_session monta credenciales OAuth de CLIs oficiales dentro del
  # contenedor (ADR-0020). Requiere el proxy de egress activo (ADR-0022)
  # cuando se aprueba network; sin el proxy los runs host_session+network
  # son rechazados en código (fail-closed). Apagado por defecto.
  host_session_enabled: false
  codex_credentials_dir: ""
  claude_credentials_dir: ""
  # Proxy de egress para runs host_session+network (ADR-0022).
  # Los runs con mounts (host_session) y network aprobado corren en la red
  # interna `egress_network` y salen a internet SOLO a través del proxy, que
  # aplica la allowlist de dominios en modo enforce. Esto cierra el riesgo C1
  # de ADR-0020: el token montado no puede exfiltrarse fuera de los dominios
  # permitidos. Ver infra/docker-compose.yml (perfil "egress") y ADR-0022.
  egress_network: "battos-egress"
  egress_proxy_addr: "battos-egress-proxy:8888"
  # Tier "connected" (Fase A3): reenvía un run a un servicio always-on en
  # localhost (Hermes, OpenClaw, …) en vez de containerizarlo. Cada entrada
  # registra el runtime adapter y le dice al ConnectedSandbox cómo alcanzarlo.
  #   kind: "local-cli" → corre `command` con `args` en el host. Placeholders
  #         {{prompt}} y {{prompt_file}} se sustituyen; el prompt también va en
  #         la env var BATTOS_PROMPT_FILE. Streamea stdout/stderr y junta los
  #         artifacts del workspace (igual que el tier direct).
  #   kind: "http" → POST {prompt, runtime_id} (JSON) a `endpoint`.
  # Vacío por defecto: el tier connected sólo funciona para los runtimes que
  # declares acá. Ejemplo (descomentar y ajustar a tus servicios):
  connected_runtimes: {}
  #   hermes:
  #     kind: "local-cli"
  #     command: "hermes"
  #     args: ["-z", "{{prompt}}"]
  #   openclaw:
  #     kind: "http"
  #     endpoint: "http://127.0.0.1:8787/v1/run"

# Asistente conversacional de BattOS
novacore:
  enabled: true
  provider: "anthropic"           # anthropic | openai
  model: "claude-3-haiku-20240307"
