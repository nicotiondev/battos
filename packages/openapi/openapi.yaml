openapi: 3.1.0
info:
  title: BattOS API
  version: 0.1.0-alpha
  description: |
    Contract for BattOS Mission Control. System and Memory Core operations are
    implemented today. Product, run and dashboard operations define the v0.1
    contract and are implemented incrementally by roadmap phase.
servers:
  - url: http://localhost:8000
    description: Local development
tags:
  - name: System
  - name: Memory
  - name: Work
  - name: Knowledge
  - name: Agents
  - name: Runtimes
  - name: Repositories
  - name: Runs
  - name: NovaCore
  - name: Usage
  - name: Events
security:
  - bearerAuth: []
paths:
  /health:
    get:
      tags: [System]
      operationId: getHealth
      security: []
      x-battos-phase: implemented
      summary: Lightweight process healthcheck
      responses:
        "200":
          description: API is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /version:
    get:
      tags: [System]
      operationId: getVersion
      security: []
      x-battos-phase: implemented
      summary: Binary and runtime version
      responses:
        "200":
          description: Version information
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VersionResponse"
  /status:
    get:
      tags: [System]
      operationId: getStatus
      x-battos-phase: implemented
      x-battos-security: configurable-bearer-implemented
      summary: Command Center status snapshot
      responses:
        "200":
          description: System status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatusResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /memory/recent:
    get:
      tags: [Memory]
      operationId: listRecentMemory
      x-battos-phase: implemented
      x-battos-security: configurable-bearer-implemented
      summary: List most recent memory observations
      parameters:
        - $ref: "#/components/parameters/Limit"
      responses:
        "200":
          description: Recent observations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryListResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /memory/search:
    post:
      tags: [Memory]
      operationId: searchMemory
      x-battos-phase: implemented
      x-battos-security: configurable-bearer-implemented
      summary: Full-text memory search with filters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemorySearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemorySearchResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /memory/save:
    post:
      tags: [Memory]
      operationId: saveMemory
      x-battos-phase: implemented
      x-battos-security: configurable-bearer-implemented
      summary: Save or upsert an observation using topic_key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MemoryObservationInput"
      responses:
        "201":
          description: Observation saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryObservation"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /memory/stats:
    get:
      tags: [Memory]
      operationId: getMemoryStats
      x-battos-phase: implemented
      x-battos-security: configurable-bearer-implemented
      summary: Memory aggregate statistics
      responses:
        "200":
          description: Statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryStats"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /memory/{id}:
    get:
      tags: [Memory]
      operationId: getMemoryObservation
      x-battos-phase: implemented
      x-battos-security: configurable-bearer-implemented
      summary: Get one observation
      parameters:
        - $ref: "#/components/parameters/NumericID"
      responses:
        "200":
          description: Observation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemoryObservation"
        "404":
          $ref: "#/components/responses/NotFound"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /domains:
    get:
      tags: [Work]
      operationId: listDomains
      x-battos-phase: 3B
      summary: List work domains
      responses:
        "200":
          $ref: "#/components/responses/DomainList"
    post:
      tags: [Work]
      operationId: createDomain
      x-battos-phase: 3B
      summary: Create a domain
      requestBody:
        $ref: "#/components/requestBodies/DomainInput"
      responses:
        "201":
          $ref: "#/components/responses/DomainItem"
  /domains/{id}:
    parameters:
      - $ref: "#/components/parameters/SlugID"
    get:
      tags: [Work]
      operationId: getDomain
      x-battos-phase: 3B
      responses:
        "200":
          $ref: "#/components/responses/DomainItem"
    patch:
      tags: [Work]
      operationId: updateDomain
      x-battos-phase: 3B
      requestBody:
        $ref: "#/components/requestBodies/DomainPatch"
      responses:
        "200":
          $ref: "#/components/responses/DomainItem"
  /projects:
    get:
      tags: [Work]
      operationId: listProjects
      x-battos-phase: 3B
      responses:
        "200":
          $ref: "#/components/responses/ProjectList"
    post:
      tags: [Work]
      operationId: createProject
      x-battos-phase: 3B
      requestBody:
        $ref: "#/components/requestBodies/ProjectInput"
      responses:
        "201":
          $ref: "#/components/responses/ProjectItem"
  /projects/{id}:
    parameters:
      - $ref: "#/components/parameters/SlugID"
    get:
      tags: [Work]
      operationId: getProject
      x-battos-phase: 3B
      responses:
        "200":
          $ref: "#/components/responses/ProjectItem"
    patch:
      tags: [Work]
      operationId: updateProject
      x-battos-phase: 3B
      requestBody:
        $ref: "#/components/requestBodies/ProjectPatch"
      responses:
        "200":
          $ref: "#/components/responses/ProjectItem"
  /goals:
    get:
      tags: [Work]
      operationId: listGoals
      x-battos-phase: 3B
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          $ref: "#/components/responses/GoalList"
    post:
      tags: [Work]
      operationId: createGoal
      x-battos-phase: 3B
      requestBody:
        $ref: "#/components/requestBodies/GoalInput"
      responses:
        "201":
          $ref: "#/components/responses/GoalItem"
  /goals/{id}:
    parameters:
      - $ref: "#/components/parameters/SlugID"
    get:
      tags: [Work]
      operationId: getGoal
      x-battos-phase: 3B
      responses:
        "200":
          $ref: "#/components/responses/GoalItem"
    patch:
      tags: [Work]
      operationId: updateGoal
      x-battos-phase: 3B
      requestBody:
        $ref: "#/components/requestBodies/GoalPatch"
      responses:
        "200":
          $ref: "#/components/responses/GoalItem"
  /tasks:
    get:
      tags: [Work]
      operationId: listTasks
      x-battos-phase: 3B
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          $ref: "#/components/responses/TaskList"
    post:
      tags: [Work]
      operationId: createTask
      x-battos-phase: 3B
      requestBody:
        $ref: "#/components/requestBodies/TaskInput"
      responses:
        "201":
          $ref: "#/components/responses/TaskItem"
  /tasks/{id}:
    parameters:
      - $ref: "#/components/parameters/SlugID"
    get:
      tags: [Work]
      operationId: getTask
      x-battos-phase: 3B
      responses:
        "200":
          $ref: "#/components/responses/TaskItem"
    patch:
      tags: [Work]
      operationId: updateTask
      x-battos-phase: 3B
      requestBody:
        $ref: "#/components/requestBodies/TaskPatch"
      responses:
        "200":
          $ref: "#/components/responses/TaskItem"
  /knowledge/workspaces:
    get:
      tags: [Knowledge]
      operationId: listKnowledgeWorkspaces
      x-battos-phase: 3B
      responses:
        "200":
          description: Knowledge workspaces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeWorkspaceList"
    post:
      tags: [Knowledge]
      operationId: createKnowledgeWorkspace
      x-battos-phase: 3B
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KnowledgeWorkspaceInput"
      responses:
        "201":
          description: Created workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/KnowledgeWorkspace"
  /journals:
    get:
      tags: [Knowledge]
      operationId: listJournals
      x-battos-phase: 3B
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Journals
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/JournalList"
    post:
      tags: [Knowledge]
      operationId: createJournal
      x-battos-phase: 3B
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JournalInput"
      responses:
        "201":
          description: Created journal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Journal"
  /artifacts:
    get:
      tags: [Knowledge]
      operationId: listArtifacts
      x-battos-phase: 3B
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactList"
    post:
      tags: [Knowledge]
      operationId: createArtifact
      x-battos-phase: 3B
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArtifactInput"
      responses:
        "201":
          description: Created artifact
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Artifact"
  /agents:
    get:
      tags: [Agents]
      operationId: listAgents
      x-battos-phase: 3B
      responses:
        "200":
          description: Agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentList"
    post:
      tags: [Agents]
      operationId: createAgent
      x-battos-phase: 3B
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
  /skills:
    get:
      tags: [Agents]
      operationId: listSkills
      x-battos-phase: 3B
      responses:
        "200":
          description: Skills
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillList"
    post:
      tags: [Agents]
      operationId: createSkill
      x-battos-phase: 3B
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillInput"
      responses:
        "201":
          description: Created skill
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Skill"
  /runtime-adapters:
    get:
      tags: [Runtimes]
      operationId: listRuntimeAdapters
      x-battos-phase: 4A
      summary: List approved or detected runtime adapters
      responses:
        "200":
          description: Runtime adapters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeAdapterList"
  /runtime-adapters/detect:
    post:
      tags: [Runtimes]
      operationId: detectRuntimeAdapters
      x-battos-phase: 4A
      summary: Detect installed runtimes without granting execution rights
      responses:
        "200":
          description: Detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuntimeAdapterList"
  /cli-tools:
    get:
      tags: [Runtimes]
      operationId: listCliTools
      x-battos-phase: 4A
      summary: List detected host CLI tools
      responses:
        "200":
          description: CLI tools
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CliToolList"
  /providers:
    get:
      tags: [Providers]
      operationId: listProviders
      x-battos-phase: 4A
      summary: List provider status without exposing secrets
      responses:
        "200":
          description: Providers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderList"
  /providers/detect:
    post:
      tags: [Providers]
      operationId: detectProviders
      x-battos-phase: 4A
      summary: Validate provider env key presence without exposing values
      responses:
        "200":
          description: Provider detection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProviderList"
  /repositories:
    get:
      tags: [Repositories]
      operationId: listRepositories
      x-battos-phase: 4C
      responses:
        "200":
          description: Repositories
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryList"
    post:
      tags: [Repositories]
      operationId: connectRepository
      x-battos-phase: 4C
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RepositoryInput"
      responses:
        "201":
          description: Repository connected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Repository"
  /runs:
    get:
      tags: [Runs]
      operationId: listRuns
      x-battos-phase: 4B
      parameters:
        - $ref: "#/components/parameters/ProjectID"
      responses:
        "200":
          description: Runs
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunList"
    post:
      tags: [Runs]
      operationId: proposeRun
      x-battos-phase: 4B
      summary: Create a run proposal requiring approval
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunProposal"
      responses:
        "201":
          description: Proposed run in awaiting_approval state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
  /runs/{id}:
    parameters:
      - $ref: "#/components/parameters/UUID"
    get:
      tags: [Runs]
      operationId: getRun
      x-battos-phase: 4B
      responses:
        "200":
          description: Run
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
  /runs/{id}/approvals:
    parameters:
      - $ref: "#/components/parameters/UUID"
    post:
      tags: [Runs]
      operationId: approveRunAction
      x-battos-phase: 4B
      summary: Approve a run, network, commit or push action
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalInput"
      responses:
        "200":
          description: Approval recorded and resulting run state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunApprovalResult"
  /runs/{id}/cancel:
    parameters:
      - $ref: "#/components/parameters/UUID"
    post:
      tags: [Runs]
      operationId: cancelRun
      x-battos-phase: 4B
      responses:
        "200":
          description: Run cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Run"
  /runs/{id}/logs:
    parameters:
      - $ref: "#/components/parameters/UUID"
    get:
      tags: [Runs]
      operationId: listRunLogs
      x-battos-phase: 4B
      responses:
        "200":
          description: Persisted log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunLogList"
  /runs/{id}/artifacts:
    parameters:
      - $ref: "#/components/parameters/UUID"
    get:
      tags: [Runs]
      operationId: listRunArtifacts
      x-battos-phase: 4B
      responses:
        "200":
          description: Produced artifacts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArtifactList"
  /runs/{id}/diff:
    parameters:
      - $ref: "#/components/parameters/UUID"
    get:
      tags: [Runs]
      operationId: getRunDiff
      x-battos-phase: 4C
      responses:
        "200":
          description: Git diff produced by the run
          content:
            text/plain:
              schema:
                type: string
  /novacore/chat:
    post:
      tags: [NovaCore]
      operationId: chatNovaCore
      x-battos-phase: 5A
      summary: Chat with the optional OS assistant
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Response and proposed actions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"
  /novacore/conversations:
    get:
      tags: [NovaCore]
      operationId: listNovaCoreConversations
      x-battos-phase: 5A
      summary: List NovaCore conversations
      responses:
        "200":
          description: NovaCore conversations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NovaCoreConversationList"
  /novacore/conversations/{id}/messages:
    parameters:
      - $ref: "#/components/parameters/UUID"
    get:
      tags: [NovaCore]
      operationId: listNovaCoreMessages
      x-battos-phase: 5A
      summary: List messages in one NovaCore conversation
      responses:
        "200":
          description: NovaCore messages
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NovaCoreMessageList"
  /usage/overview:
    get:
      tags: [Usage]
      operationId: getUsageOverview
      x-battos-phase: 5B
      responses:
        "200":
          description: Usage overview
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UsageOverviewItem"
  /events/system-metrics:
    get:
      tags: [Events]
      operationId: streamSystemMetrics
      x-battos-phase: 5B
      responses:
        "200":
          description: SSE metric events
          content:
            text/event-stream:
              schema:
                type: string
  /events/runs/{id}:
    parameters:
      - $ref: "#/components/parameters/UUID"
    get:
      tags: [Events]
      operationId: streamRunEvents
      x-battos-phase: 4B
      summary: Stream run snapshots, logs and terminal state
      responses:
        "200":
          description: SSE events `run.snapshot`, `run.log`, `run.done` and `run.error`
          content:
            text/event-stream:
              schema:
                type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: BattOS admin token
  parameters:
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    NumericID:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    SlugID:
      name: id
      in: path
      required: true
      schema:
        type: string
        pattern: "^[a-z0-9][a-z0-9-]*$"
    UUID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProjectID:
      name: project_id
      in: query
      description: Optional filter for project-scoped collections.
      schema:
        type: string
  requestBodies:
    DomainInput:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DomainInput"
    DomainPatch:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DomainPatch"
    ProjectInput:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProjectInput"
    ProjectPatch:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProjectPatch"
    GoalInput:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GoalInput"
    GoalPatch:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GoalPatch"
    TaskInput:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TaskInput"
    TaskPatch:
      required: true
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TaskPatch"
  responses:
    Unauthorized:
      description: Missing or invalid BattOS admin token
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    DomainList:
      description: Domains
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/DomainList"
    DomainItem:
      description: Domain
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Domain"
    ProjectList:
      description: Projects
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ProjectList"
    ProjectItem:
      description: Project
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Project"
    GoalList:
      description: Goals
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/GoalList"
    GoalItem:
      description: Goal
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Goal"
    TaskList:
      description: Tasks
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/TaskList"
    TaskItem:
      description: Task
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Task"
  schemas:
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [message, code]
          properties:
            message:
              type: string
            code:
              type: integer
    HealthStatus:
      type: string
      enum: [ok, degraded, down, unknown]
    HealthResponse:
      type: object
      required: [status, timestamp]
      properties:
        status:
          $ref: "#/components/schemas/HealthStatus"
        timestamp:
          type: string
          format: date-time
    VersionResponse:
      type: object
      required: [version, commit, build_date, go_version]
      properties:
        version: { type: string }
        commit: { type: string }
        build_date: { type: string }
        go_version: { type: string }
    StatusResponse:
      type: object
      required: [version, overall, subsystems, metrics, timestamp]
      properties:
        version:
          $ref: "#/components/schemas/VersionResponse"
        overall:
          $ref: "#/components/schemas/HealthStatus"
        subsystems:
          type: array
          items:
            $ref: "#/components/schemas/SubsystemHealth"
        metrics:
          $ref: "#/components/schemas/SystemMetrics"
        timestamp:
          type: string
          format: date-time
    SubsystemHealth:
      type: object
      required: [name, status]
      properties:
        name: { type: string }
        status:
          $ref: "#/components/schemas/HealthStatus"
        detail: { type: string }
        latency_ms: { type: integer }
    SystemMetrics:
