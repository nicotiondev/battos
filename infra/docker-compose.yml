# BattOS - Docker Compose para dev local y VPS.
#
# Servicios:
#   battos-api     API Go
#   battos-worker  Worker de runs, opcional con perfil worker
#
# Uso:
#   cp infra/.env.example infra/.env
#   docker compose -f infra/docker-compose.yml --env-file infra/.env up -d
#   docker compose -f infra/docker-compose.yml logs -f battos-api
#   docker compose -f infra/docker-compose.yml --env-file infra/.env --profile worker up -d battos-worker

name: battos

services:
  battos-api:
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: battos-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      BATTOS_ENV: ${BATTOS_ENV:-production}
      BATTOS_SECRET_KEY: ${BATTOS_SECRET_KEY}
      BATTOS_API_HOST: "0.0.0.0"
      BATTOS_AUTH_MODE: "token"
      BATTOS_API_TOKEN: ${BATTOS_API_TOKEN}
      BATTOS_DATABASE_PATH: ${BATTOS_DATABASE_PATH:-/app/data/battos.db}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      ALLOW_CLI_EXECUTION: ${ALLOW_CLI_EXECUTION:-false}
      ALLOW_DOCKER_MUTATION: ${ALLOW_DOCKER_MUTATION:-false}
      REQUIRE_APPROVAL_FOR_HIGH_RISK: ${REQUIRE_APPROVAL_FOR_HIGH_RISK:-true}
    volumes:
      - battos_data:/app/data
      - ../config:/app/config:ro
      - ../agents:/app/agents:ro
      - ../skills:/app/skills:ro
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

  battos-worker:
    profiles: ["worker"]
    build:
      context: ..
      dockerfile: infra/Dockerfile.api
    container_name: battos-worker
    restart: unless-stopped
    entrypoint: ["/app/battos-worker"]
    command: ["-once=false"]
    environment:
      BATTOS_ENV: ${BATTOS_ENV:-production}
      BATTOS_SECRET_KEY: ${BATTOS_SECRET_KEY}
      BATTOS_AUTH_MODE: "token"
      BATTOS_API_TOKEN: ${BATTOS_API_TOKEN}
      BATTOS_DATABASE_PATH: ${BATTOS_DATABASE_PATH:-/app/data/battos.db}
      BATTOS_EXECUTION_SANDBOX_MODE: ${BATTOS_EXECUTION_SANDBOX_MODE:-dry_run}
      BATTOS_EXECUTION_DOCKER_IMAGE: ${BATTOS_EXECUTION_DOCKER_IMAGE:-alpine:3.20}
      BATTOS_EXECUTION_WORKSPACES_DIR: ${BATTOS_EXECUTION_WORKSPACES_DIR:-/app/data/runs/workspaces}
      BATTOS_EXECUTION_POLL_INTERVAL_S: ${BATTOS_EXECUTION_POLL_INTERVAL_S:-2}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      ALLOW_CLI_EXECUTION: ${ALLOW_CLI_EXECUTION:-false}
      ALLOW_DOCKER_MUTATION: ${ALLOW_DOCKER_MUTATION:-false}
      REQUIRE_APPROVAL_FOR_HIGH_RISK: ${REQUIRE_APPROVAL_FOR_HIGH_RISK:-true}
    volumes:
      - battos_data:/app/data
      - ../config:/app/config:ro
      - ../agents:/app/agents:ro
      - ../skills:/app/skills:ro
    depends_on:
      battos-api:
        condition: service_healthy

volumes:
  battos_data:
